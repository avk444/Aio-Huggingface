name: Auto Update HF Space

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://Renegade44:${HF_TOKEN}@huggingface.co/spaces/Renegade44/AIOstreams hf_repo

      - name: Copy files (exclude hf_repo)
        run: |
          rsync -av --exclude=hf_repo ./ hf_repo/

      - name: Trigger rebuild (edit README)
        run: |
          echo "Update: $(date)" >> hf_repo/README.md

      - name: Commit and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf_repo
          git config user.email "bot@example.com"
          git config user.name "bot"

          git add .
          git commit -m "auto update" || echo "no changes"

          git remote remove origin
          git remote add origin https://Renegade44:${HF_TOKEN}@huggingface.co/spaces/Renegade44/AIOstreams

          git push origin main
