name: Auto Update HF Space

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Edit README (trigger rebuild)
        run: |
          echo "Update: $(date)" >> README.md

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "bot"

          git add README.md
          git commit -m "auto update" || echo "no changes"

          git remote add hf https://Renegade44:${HF_TOKEN}@huggingface.co/spaces/Renegade44/AIOstreams
          git push hf main --force
