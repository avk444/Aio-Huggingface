name: Auto Update HF Space

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (FULL history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 IMPORTANT FIX

      - name: Edit Dockerfile
        run: |
          echo "# update $(date)" >> Dockerfile

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "bot"
          git add Dockerfile
          git commit -m "auto update" || echo "no changes"

          git remote add hf https://Renegade44:${HF_TOKEN}@huggingface.co/spaces/Renegade44/AIOstreams
          git pull hf main --allow-unrelated-histories || true
          git push hf main
