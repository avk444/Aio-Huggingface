name: Auto Update HF Space

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger rebuild (edit README)
        run: |
          echo "Update: $(date)" >> README.md

      - name: Commit change
        run: |
          git config user.email "bot@example.com"
          git config user.name "bot"
          git add README.md
          git commit -m "auto update" || echo "no changes"

      - name: Push directly to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Renegade44:${HF_TOKEN}@huggingface.co/spaces/Renegade44/AIOstreams HEAD:main --force
